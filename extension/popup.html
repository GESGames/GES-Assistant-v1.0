<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --deep-space: #0a0a12;
      --neon-purple: #9d00ff;
      --neon-cyan: #00f2ff;
      --glass: rgba(157, 0, 255, 0.1);
      --text: #e0e0ff;
    }

    body {
      width: 380px; height: 550px; font-family: 'Segoe UI', sans-serif;
      margin: 0; background: var(--deep-space); color: var(--text);
      border: 1px solid var(--neon-purple); overflow: hidden;
    }

    /* Tabs HUD */
    .tabs { display: flex; background: #000; border-bottom: 2px solid var(--neon-purple); }
    .tab { 
      flex: 1; padding: 15px 5px; text-align: center; cursor: pointer; 
      font-size: 9px; font-weight: bold; letter-spacing: 1px; color: #555; transition: 0.3s;
    }
    .tab.active { color: var(--neon-cyan); background: var(--glass); box-shadow: inset 0 -2px 10px var(--neon-purple); }

    .panel { display: none; padding: 20px; height: 460px; overflow-y: auto; box-sizing: border-box; }
    .panel.active { display: block; animation: powerOn 0.4s ease-out; }

    @keyframes powerOn { from { opacity: 0; filter: brightness(3); } to { opacity: 1; filter: brightness(1); } }

    /* Inputs & Buttons */
    .ges-input {
      width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid var(--neon-purple);
      border-radius: 4px; color: var(--neon-cyan); margin-bottom: 10px; box-sizing: border-box; outline: none;
    }
    .btn-core {
      background: linear-gradient(45deg, #4b0082, var(--neon-purple));
      color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer;
      font-weight: bold; width: 100%; text-transform: uppercase; margin-top: 5px;
    }

    /* Task Cards */
    .task-card {
      background: rgba(255,255,255,0.05); border-left: 3px solid var(--neon-cyan);
      padding: 10px; margin-bottom: 10px; border-radius: 4px; font-size: 11px;
    }
    .task-card .time { color: var(--neon-purple); font-weight: bold; }

    /* Plan Cards */
    .plan-card {
      border: 1px solid #333; padding: 15px; border-radius: 8px; margin-bottom: 10px; text-align: center;
    }
    .plan-card.pro { border-color: var(--neon-cyan); box-shadow: 0 0 10px rgba(0, 242, 255, 0.2); }

    #chat-box {
      height: 250px; overflow-y: auto; background: rgba(0,0,0,0.3);
      border: 1px solid rgba(157,0,255,0.2); padding: 10px; font-size: 12px; margin-bottom: 10px;
    }
    .status-badge { font-size: 9px; padding: 2px 5px; border-radius: 4px; background: #222; margin-left: 5px;}
  </style>
</head>
<body>

  <div class="tabs">
    <div class="tab active" data-tab="autopilot">AUTO-PILOT</div>
    <div class="tab" data-tab="chat">COMMMS</div>
    <div class="tab" data-tab="plans">UPGRADE</div>
    <div class="tab" data-tab="settings">SYSTEM</div>
  </div>

  <!-- AUTO-PILOT PANEL -->
  <div class="panel active" id="panel-autopilot">
    <h4 style="margin-top:0; color:var(--neon-cyan)">DAILY AUTOMATIONS <span id="usage-count" class="status-badge">0/5</span></h4>
    
    <div style="border: 1px solid #333; padding: 10px; border-radius: 8px; margin-bottom: 20px;">
      <input type="text" id="task-desc" class="ges-input" placeholder="Action (e.g. Post to Instagram)">
      <div style="display:flex; gap:10px;">
        <input type="time" id="task-time" class="ges-input">
        <button id="btn-add-task" class="btn-core" style="margin-top:0">SCHEDULE</button>
      </div>
    </div>

    <div id="task-list">
      <!-- Scheduled tasks appear here -->
    </div>
  </div>

  <!-- CHAT PANEL -->
  <div class="panel" id="panel-chat">
    <div id="chat-box">CORE SYSTEMS ONLINE...</div>
    <div style="display:flex; gap:5px;">
      <input type="text" id="chat-input" class="ges-input" style="margin-bottom:0" placeholder="Manual Override...">
      <button id="btn-send-chat" class="btn-core" style="width:70px;">SEND</button>
    </div>
  </div>

  <!-- PLANS PANEL -->
  <div class="panel" id="panel-plans">
    <div class="plan-card">
      <h3 style="margin:0">FREE PILOT</h3>
      <p style="font-size:12px">5 Automated Daily Tasks<br>Standard Response</p>
      <div style="color:var(--neon-cyan)">ACTIVE</div>
    </div>
    <div class="plan-card pro">
      <h3 style="margin:0; color:var(--neon-cyan)">NEON PRO</h3>
      <p style="font-size:12px">Unlimited Daily Tasks<br>Priority Background Execution<br>Multi-Step Flows</p>
      <button class="btn-core">$5 / MONTH</button>
    </div>
  </div>

  <!-- SETTINGS PANEL -->
  <div class="panel" id="panel-settings">
    <label style="font-size:11px">OPENROUTER_API_KEY</label>
    <input id="api-key-input" type="password" class="ges-input" placeholder="sk-or-v1-...">
    <button id="btn-save-key" class="btn-core">SAVE CONFIG</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
