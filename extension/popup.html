<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --bg-dark: #0f0c29;
      --glass: rgba(255, 255, 255, 0.1);
      --neon-purple: #bc13fe;
      --neon-cyan: #0ff;
      --text: #e0e0e0;
      --accent: #6a11cb;
    }

    body {
      width: 360px;
      min-height: 500px;
      font-family: 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: var(--text);
      overflow-x: hidden;
    }

    /* Tabs Estilo Cockpit */
    .tabs {
      display: flex;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--neon-purple);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .tab {
      flex: 1;
      padding: 14px;
      text-align: center;
      cursor: pointer;
      font-size: 10px;
      font-weight: bold;
      letter-spacing: 1px;
      transition: 0.3s;
      color: #888;
    }

    .tab.active {
      color: var(--neon-cyan);
      background: rgba(188, 19, 254, 0.2);
      box-shadow: inset 0 -2px 10px var(--neon-purple);
    }

    .panel { display: none; padding: 20px; animation: fadeIn 0.4s ease; }
    .panel.active { display: block; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Inputs y Botones Futuristas */
    .ges-input {
      width: 100%;
      padding: 10px;
      background: var(--glass);
      border: 1px solid var(--neon-purple);
      border-radius: 5px;
      color: white;
      box-sizing: border-box;
      margin-bottom: 15px;
      outline: none;
    }

    .ges-input:focus { border-color: var(--neon-cyan); box-shadow: 0 0 8px var(--neon-cyan); }

    .btn {
      background: linear-gradient(45deg, var(--accent), var(--neon-purple));
      color: white;
      border: none;
      padding: 12px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: 0.3s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .btn:hover { transform: scale(1.02); box-shadow: 0 0 15px var(--neon-purple); }

    /* Área de Chat y Resultados */
    #chat-box {
      height: 220px;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
      font-size: 12px;
      line-height: 1.5;
      scrollbar-width: thin;
      scrollbar-color: var(--neon-purple) transparent;
    }

    /* Mensajes de la IA */
    .msg { margin-bottom: 10px; padding: 8px; border-radius: 5px; }
    .msg-ia { border-left: 3px solid var(--neon-cyan); background: rgba(0, 255, 255, 0.05); }
    .msg-user { border-right: 3px solid var(--neon-purple); background: rgba(188, 19, 254, 0.05); text-align: right; }

    /* Acciones en Home */
    .auto-item {
      background: var(--glass);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      cursor: pointer;
      border: 1px solid transparent;
      transition: 0.2s;
    }
    .auto-item:hover { border-color: var(--neon-cyan); background: rgba(255,255,255,0.15); }
    
    .loading-shimmer { color: var(--neon-cyan); font-style: italic; font-size: 11px; }
  </style>
</head>
<body>

  <div class="tabs">
    <div class="tab active" data-tab="home">ACCIONES</div>
    <div class="tab" data-tab="chat">CHAT</div>
    <div class="tab" data-tab="create">NUEVO</div>
    <div class="tab" data-tab="history">LOGS</div>
    <div class="tab" data-tab="settings">KEY</div>
  </div>

  <!-- HOME: LISTA DE ACCIONES -->
  <div class="panel active" id="panel-home">
    <div id="auto-list">Cargando protocolos...</div>
  </div>

  <!-- CHAT / RESULTADOS -->
  <div class="panel" id="panel-chat">
    <div id="chat-box">Sistemas listos. Esperando órdenes...</div>
    <div style="display:flex; gap:8px;">
      <input type="text" id="chat-input" class="ges-input" style="margin-bottom:0" placeholder="Comando de voz/texto...">
      <button id="btn-send-chat" class="btn" style="width:60px;">EXE</button>
    </div>
  </div>

  <!-- CREAR ACCIÓN -->
  <div class="panel" id="panel-create">
    <input type="text" id="new-name" class="ges-input" placeholder="Nombre del Protocolo">
    <input type="text" id="new-emoji" class="ges-input" placeholder="Icono (Emoji)">
    <textarea id="new-prompt" class="ges-input" style="height:80px;" placeholder="Instrucciones para la IA..."></textarea>
    <button id="btn-save-action" class="btn">Sincronizar Protocolo</button>
  </div>

  <!-- HISTORIAL -->
  <div class="panel" id="panel-history">
    <div id="history-list"></div>
  </div>

  <!-- CONFIGURACIÓN -->
  <div class="panel" id="panel-settings">
    <label style="font-size: 10px; color: var(--neon-cyan);">OPENROUTER_CORE_KEY</label>
    <input id="api-key-input" type="password" class="ges-input" placeholder="sk-or-v1-...">
    <button id="btn-save-key" class="btn">Guardar en Memoria</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
