<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <style>
    :root { --purple: #534AB7; --purple-light: #EEEDFE; --text: #1a1a1a; --gray: #f4f4f4; }
    body { width: 340px; min-height: 450px; font-family: sans-serif; margin: 0; color: var(--text); background: white; }
    
    /* NAV & TABS */
    .tabs { display: flex; background: #fff; border-bottom: 1px solid #ddd; position: sticky; top: 0; }
    .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; font-size: 11px; font-weight: bold; color: #666; transition: 0.2s; }
    .tab.active { color: var(--purple); border-bottom: 3px solid var(--purple); background: var(--purple-light); }

    /* PANELS */
    .panel { display: none; padding: 15px; }
    .panel.active { display: block; }

    /* ELEMENTS */
    .auto-item { display: flex; align-items: center; gap: 10px; padding: 10px; border: 1px solid #eee; margin-bottom: 8px; border-radius: 10px; background: #fff; }
    .auto-item:hover { border-color: var(--purple); }
    .ges-input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 12px; }
    .btn { background: var(--purple); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    
    /* CHAT & HISTORY */
    #chat-box { height: 220px; overflow-y: auto; background: var(--gray); padding: 10px; border-radius: 10px; margin-bottom: 10px; font-size: 12px; border: 1px solid #eee; }
    .hist-item { font-size: 11px; border-bottom: 1px solid #eee; padding: 8px 0; }
    .fav-btn { cursor: pointer; border: none; background: none; font-size: 18px; }
  </style>
</head>
<body>

  <div class="tabs">
    <div class="tab active" data-tab="home">HOME</div>
    <div class="tab" data-tab="chat">CHAT</div>
    <div class="tab" data-tab="history">HISTORIAL</div>
    <div class="tab" data-tab="settings">⚙</div>
  </div>

  <!-- HOME: FAVORITOS Y ACCIONES -->
  <div class="panel active" id="panel-home">
    <div id="auto-list">Cargando acciones...</div>
  </div>

  <!-- CHAT IA -->
  <div class="panel" id="panel-chat">
    <div id="chat-box">¡Hola! Pregúntame lo que quieras.</div>
    <div style="display:flex; gap:5px;">
      <input type="text" id="chat-input" class="ges-input" placeholder="Escribe aquí...">
      <button id="btn-send-chat" class="btn">🚀</button>
    </div>
  </div>

  <!-- HISTORIAL -->
  <div class="panel" id="panel-history">
    <div style="font-size:12px; font-weight:bold; margin-bottom:10px;">Acciones Recientes</div>
    <div id="history-list"></div>
  </div>

  <!-- AJUSTES -->
  <div class="panel" id="panel-settings">
    <label style="font-size:11px; font-weight:bold; margin-bottom:5px; display:block;">GOOGLE GEMINI API KEY</label>
    <input type="password" id="api-key-input" class="ges-input" placeholder="Pega tu clave de AI Studio">
    <button id="btn-save-key" class="btn" style="width:100%; margin-top:10px;">Guardar Configuración</button>
    <p style="font-size:10px; margin-top:10px;">Obtén tu clave gratis en <a href="https://aistudio.google.com/" target="_blank">Google AI Studio</a></p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
