<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --deep-space: #05050a;
      --neon-purple: #9d00ff;
      --neon-cyan: #00f2ff;
      --glass: rgba(157, 0, 255, 0.1);
      --text-main: #e0e0ff;
    }

    body {
      width: 380px;
      min-height: 520px;
      font-family: 'Segoe UI', 'Orbitron', sans-serif;
      margin: 0;
      background: var(--deep-space);
      color: var(--text-main);
      border: 1px solid var(--neon-purple);
    }

    /* Top Navigation HUD */
    .tabs {
      display: flex;
      background: rgba(0, 0, 0, 0.8);
      border-bottom: 2px solid var(--neon-purple);
      box-shadow: 0 0 15px rgba(157, 0, 255, 0.3);
    }

    .tab {
      flex: 1;
      padding: 12px 5px;
      text-align: center;
      cursor: pointer;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 1px;
      transition: all 0.3s;
      color: #666;
      text-transform: uppercase;
    }

    .tab.active {
      color: var(--neon-cyan);
      background: var(--glass);
      text-shadow: 0 0 8px var(--neon-cyan);
    }

    /* Content Panels */
    .panel { display: none; padding: 20px; animation: scanline 0.5s ease-out; }
    .panel.active { display: block; }

    @keyframes scanline {
      from { opacity: 0; transform: scale(0.95); filter: brightness(2); }
      to { opacity: 1; transform: scale(1); filter: brightness(1); }
    }

    /* HUD Stats Bar */
    .usage-bar {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      height: 6px;
      margin: 10px 0;
      overflow: hidden;
      border: 1px solid rgba(0, 242, 255, 0.2);
    }
    #energy-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--neon-purple), var(--neon-cyan));
      width: 100%;
      transition: width 0.5s;
    }

    /* UI Components */
    .ges-input {
      width: 100%;
      padding: 12px;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid var(--neon-purple);
      border-radius: 4px;
      color: var(--neon-cyan);
      margin-bottom: 15px;
      box-sizing: border-box;
    }

    .btn-core {
      background: linear-gradient(45deg, #4b0082, var(--neon-purple));
      color: white;
      border: none;
      padding: 12px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
      text-transform: uppercase;
      box-shadow: 0 0 10px var(--neon-purple);
    }

    .btn-core:hover { box-shadow: 0 0 20px var(--neon-purple); transform: translateY(-1px); }

    /* Chat Area */
    #chat-box {
      height: 200px;
      overflow-y: auto;
      background: rgba(0,0,0,0.4);
      border-radius: 8px;
      padding: 10px;
      font-size: 12px;
      margin-bottom: 10px;
      border: 1px solid rgba(157, 0, 255, 0.2);
    }

    /* Pricing Cards */
    .plan-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid #333;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 10px;
      text-align: center;
      transition: 0.3s;
    }
    .plan-card.pro { border-color: var(--neon-cyan); background: rgba(0, 242, 255, 0.05); }
    .price { font-size: 24px; font-weight: bold; color: var(--neon-cyan); }
    
    .badge {
      font-size: 9px;
      background: var(--neon-cyan);
      color: black;
      padding: 2px 6px;
      border-radius: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="tabs">
    <div class="tab active" data-tab="home">TERMINAL</div>
    <div class="tab" data-tab="chat">COMMMS</div>
    <div class="tab" data-tab="plans">PLANS</div>
    <div class="tab" data-tab="settings">SYSTEM</div>
  </div>

  <!-- PANEL: HOME -->
  <div class="panel active" id="panel-home">
    <div style="display:flex; justify-content: space-between; font-size: 10px; color: var(--neon-cyan);">
      <span>DAILY ENERGY</span>
      <span id="usage-text">5/5 LEFT</span>
    </div>
    <div class="usage-bar"><div id="energy-fill"></div></div>
    
    <div id="auto-list" style="margin-top:20px;">
      <!-- Actions render here -->
    </div>
  </div>

  <!-- PANEL: CHAT -->
  <div class="panel" id="panel-chat">
    <div id="chat-box">READY FOR INPUT...</div>
    <div style="display:flex; gap:5px;">
      <input type="text" id="chat-input" class="ges-input" style="margin-bottom:0" placeholder="Type command...">
      <button id="btn-send-chat" class="btn-core" style="width:70px;">SEND</button>
    </div>
  </div>

  <!-- PANEL: PLANS -->
  <div class="panel" id="panel-plans">
    <div class="plan-card">
      <div style="font-weight:bold">BASIC CITIZEN</div>
      <div class="price">FREE</div>
      <p style="font-size:11px; color:#aaa;">5 Auto-Actions / Day<br>Standard AI Core</p>
      <div class="badge">ACTIVE</div>
    </div>

    <div class="plan-card pro">
      <div style="font-weight:bold; color:var(--neon-cyan)">NEON OVERLORD</div>
      <div class="price">$5<small>/mo</small></div>
      <p style="font-size:11px; color:#aaa;">Unlimited Actions<br>Priority AI Response<br>Custom Protocols</p>
      <button class="btn-core" style="background:var(--neon-cyan); color:black;">UPGRADE NOW</button>
    </div>
  </div>

  <!-- PANEL: SETTINGS -->
  <div class="panel" id="panel-settings">
    <label style="font-size: 11px; color: var(--neon-purple);">CORE_API_KEY</label>
    <input id="api-key-input" type="password" class="ges-input" placeholder="sk-or-v1-...">
    <button id="btn-save-key" class="btn-core">SAVE CONFIG</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
